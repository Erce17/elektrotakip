{% extends "base.html" %}

{% block title %}Giriş Yap - ElektroTakip{% endblock %}

{% block nav_links %}{% endblock %} 

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-slate-200 mt-10">
    <h2 class="text-2xl font-bold text-center text-slate-700 mb-6">Sisteme Giriş</h2>
    
    {% if error %}
    <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded" role="alert">
        <p class="text-sm">{{ error }}</p>
    </div>
    {% endif %}
    
    <form action="/login" method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">E-posta</label>
            <input type="email" name="email" required 
                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Şifre</label>
            <input type="password" name="password" required 
                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
        </div>
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg transition shadow-sm">
            Giriş Yap
        </button>
    </form>
    
    <p class="text-center text-sm text-slate-500 mt-6">
        Hesabın yok mu? <a href="/register" class="text-blue-600 hover:text-blue-800 hover:underline font-medium">Kayıt Ol</a>
    </p>
</div>
{% endblock %}
