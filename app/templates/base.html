<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ElektroTakip{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-blue-700 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight">ElektroTakip</a>
           <nav class="space-x-4 flex items-center">
                {% block nav_links %}
                <form action="/logout" method="POST" class="m-0 p-0 inline">
                    <button type="submit" class="hover:text-blue-200 transition font-medium bg-transparent border-none cursor-pointer">
                        Çıkış Yap
                    </button>
                </form>
                {% endblock %}
            </nav>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-slate-800 text-white text-center py-4 mt-auto">
        <p class="text-sm">&copy; 2026 ElektroTakip - MVP</p>
    </footer>

</body>
</html>
